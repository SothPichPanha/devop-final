[supervisord]
nodaemon=true
user=root
logfile=/var/log/supervisord.log
pidfile=/var/run/supervisord.pid

[program:sshd]
command=/usr/sbin/sshd -D
autostart=true
autorestart=true
stdout_logfile=/var/log/sshd.log
stderr_logfile=/var/log/sshd.err

[program:nginx]
command=/usr/sbin/nginx -g "daemon off;"
autostart=true
autorestart=true
stdout_logfile=/var/log/nginx.log
stderr_logfile=/var/log/nginx.err

[program:springboot]
command=java -jar /app/app.war --server.port=9090 --server.address=127.0.0.1
autostart=true
autorestart=true
stdout_logfile=/var/log/springboot.log
stderr_logfile=/var/log/springboot.err
environment=
    SPRING_DATASOURCE_URL="%(ENV_SPRING_DATASOURCE_URL)s",
    SPRING_DATASOURCE_USERNAME="%(ENV_SPRING_DATASOURCE_USERNAME)s",
    SPRING_DATASOURCE_PASSWORD="%(ENV_SPRING_DATASOURCE_PASSWORD)s"
