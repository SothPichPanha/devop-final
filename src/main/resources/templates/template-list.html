<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Template List</title>
    <style>
        body { font-family: Arial; margin: 40px; background: #f5f5f5; }
        .container { max-width: 800px; margin: 0 auto; background: white; padding: 30px; border-radius: 8px; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 10px; text-align: left; border-bottom: 1px solid #ddd; }
        .btn { display: inline-block; padding: 8px 16px; background: #1d4ed8; color: white; text-decoration: none; border-radius: 4px; }
    </style>
</head>
<body>
<div th:include="fragments/toast :: toast"></div>
<div class="container">
    <h2>ID Card Templates</h2>
    <a href="/templates/new" class="btn">New Template</a>
    <table>
        <thead><tr><th>Code</th><th>Name</th><th>Organization</th><th>Actions</th></tr></thead>
        <tbody>
            <tr th:each="t : ${templates}">
                <td th:text="${t.code}"></td>
                <td th:text="${t.name}"></td>
                <td th:text="${t.organizationName}"></td>
                <td>
                    <a th:href="@{'/templates/' + ${t.id} + '/edit'}">Edit</a>
                    <form th:action="@{'/templates/' + ${t.id} + '/delete'}" method="post" style="display:inline;">
                        <button type="submit" onclick="return confirm('Delete?')">Delete</button>
                    </form>
                </td>
            </tr>
        </tbody>
    </table>
    <a href="/profiles" style="display:inline-block; margin-top: 20px;">Back to Profiles</a>
</div>
</body>
</html>
