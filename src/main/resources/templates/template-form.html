<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Template Form</title>
    <style>
        body { font-family: Arial; margin: 40px; background: #f5f5f5; }
        .container { max-width: 600px; margin: 0 auto; background: white; padding: 30px; border-radius: 8px; }
        .form-group { margin-bottom: 15px; }
        label { display: block; font-weight: bold; margin-bottom: 5px; }
        input { width: 100%; padding: 8px; border: 1px solid #ddd; border-radius: 4px; }
        button { background: #1d4ed8; color: white; padding: 10px 20px; border: none; border-radius: 4px; cursor: pointer; }
    </style>
</head>
<body>
<div th:include="fragments/toast :: toast"></div>
<div class="container">
    <h2 th:text="${template.id} ? 'Edit Template' : 'New Template'">Template Form</h2>
    <form th:action="${template.id} ? @{'/templates/' + ${template.id}} : @{/templates}"
          th:object="${template}" method="post">
        <div class="form-group">
            <label>Code</label>
            <input type="text" th:field="*{code}" required />
        </div>
        <div class="form-group">
            <label>Name</label>
            <input type="text" th:field="*{name}" required />
        </div>
        <div class="form-group">
            <label>Organization Name</label>
            <input type="text" th:field="*{organizationName}" />
        </div>
        <div class="form-group">
            <label>Layout (VERTICAL / HORIZONTAL)</label>
            <input type="text" th:field="*{layout}" />
        </div>
        <div class="form-group">
            <label>Primary Color</label>
            <input type="text" th:field="*{primaryColor}" />
        </div>
        <div class="form-group">
            <label>Secondary Color</label>
            <input type="text" th:field="*{secondaryColor}" />
        </div>
        <div class="form-group">
            <label>Text Color</label>
            <input type="text" th:field="*{textColor}" />
        </div>
        <div class="form-group">
            <label>Tagline</label>
            <input type="text" th:field="*{tagline}" />
        </div>
        <button type="submit">Save</button>
        <a href="/templates" style="margin-left: 10px;">Cancel</a>
    </form>
</div>
</body>
</html>
