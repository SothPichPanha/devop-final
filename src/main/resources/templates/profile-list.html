<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Profile List</title>
    <style>
        body { font-family: Arial; margin: 40px; background: #f5f5f5; }
        .container { max-width: 1000px; margin: 0 auto; background: white; padding: 30px; border-radius: 8px; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 10px; text-align: left; border-bottom: 1px solid #ddd; }
        th { background: #f8f9fa; }
        .actions a, .actions button { margin-right: 5px; color: #1d4ed8; text-decoration: none; }
        .btn { display: inline-block; padding: 8px 16px; background: #1d4ed8; color: white; text-decoration: none; border-radius: 4px; }
        .btn:hover { background: #1e40af; }
        .msg { padding: 10px; background: #d4edda; color: #155724; margin-bottom: 20px; border-radius: 4px; }
    </style>
</head>
<body>
<div th:include="fragments/toast :: toast"></div>
<div class="container">
    <h2>ID Card Profiles</h2>
    <div th:if="${message}" class="msg" th:text="${message}"></div>
    <div style="margin-bottom: 20px; display: flex; gap: 10px;">
        <a href="/profiles/new" class="btn">New Profile</a>
        <a href="/templates" class="btn">Manage Templates</a>
    </div>
    <form action="/profiles/search" method="get" style="margin-bottom: 20px;">
        <input type="text" name="name" placeholder="Search by name..." style="padding: 8px; width: 300px;" />
        <button type="submit" style="padding: 8px 16px;">Search</button>
    </form>
    <table>
        <thead>
            <tr>
                <th>Reg Number</th>
                <th>Name</th>
                <th>Type</th>
                <th>Department</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="p : ${profiles}">
                <td th:text="${p.registrationNumber}"></td>
                <td th:text="${p.fullName}"></td>
                <td th:text="${p.type}"></td>
                <td th:text="${p.department}"></td>
                <td class="actions">
                    <a th:href="@{'/profiles/' + ${p.id} + '/preview'}">Preview</a>
                    <a th:href="@{'/profiles/' + ${p.id} + '/edit'}">Edit</a>
                    <a th:href="@{'/profiles/' + ${p.id} + '/pdf'}">PDF</a>
                    <form th:action="@{'/profiles/' + ${p.id} + '/delete'}" method="post" style="display:inline;">
                        <button type="submit" onclick="return confirm('Delete?')">Delete</button>
                    </form>
                </td>
            </tr>
        </tbody>
    </table>
    <p th:if="${profiles.isEmpty()}">No profiles found.</p>
</div>
</body>
</html>
