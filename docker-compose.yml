version: "3.9"

services:
  web:
    build:
      context: .
      dockerfile: web/Dockerfile
    ports:
      - "8443:8080"
      - "2222:22"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://db:3306/B-Soth_Pichpanha-db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: Hello@123
    depends_on:
      db:
        condition: service_healthy

  db:
    image: mysql:8.0
    ports:
      - "3307:3306"
    environment:
      MYSQL_DATABASE: B-Soth_Pichpanha-db
      MYSQL_ROOT_PASSWORD: Hello@123
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - mysql_data:/var/lib/mysql

volumes:
  mysql_data:
